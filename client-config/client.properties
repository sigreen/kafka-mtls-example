# Kafka Client Configuration with mTLS Authentication
# This file is used by external clients connecting to the Kafka cluster

# Bootstrap servers - use the external route endpoint
# Replace with your OpenShift router domain (get with: oc get ingresses.config.openshift.io cluster -o jsonpath='{.spec.domain}')
bootstrap.servers=kafka-bootstrap.apps.your-domain.com:443

# Security protocol - SSL for mTLS
security.protocol=SSL

# Truststore configuration (contains the cluster CA certificate)
ssl.truststore.location=./certs/truststore.p12
ssl.truststore.password=<truststore-password-from-extract-script>
ssl.truststore.type=PKCS12

# Keystore configuration (contains the client certificate and private key)
ssl.keystore.location=./certs/user.p12
ssl.keystore.password=<keystore-password-from-extract-script>
ssl.keystore.type=PKCS12

# SSL protocol configuration
ssl.protocol=TLSv1.3
ssl.enabled.protocols=TLSv1.3,TLSv1.2

# Optional: SSL cipher suites
ssl.cipher.suites=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256

# Optional: Hostname verification
ssl.endpoint.identification.algorithm=HTTPS

# Producer-specific settings
acks=all
retries=3
max.in.flight.requests.per.connection=5
enable.idempotence=true
compression.type=snappy

# Consumer-specific settings
auto.offset.reset=earliest
enable.auto.commit=false
group.id=external-client-group
